<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | SENAI</title>
    <style>
        /* Paleta de Cores SENAI: Azul (#005594), Vermelho Detalhe (#E30613), Cinza (#F4F4F4) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            border-top: 6px solid #005594; /* Azul SENAI */
        }

        h1 {
            color: #005594;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Garante que o padding não estoure a largura */
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #005594;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #005594;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #003d6b;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-link:hover {
            text-decoration: underline;
            color: #E30613; /* Vermelho detalhe para o hover */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cadastro</h1>

        <form action="/cadastro" method="post">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Ex: aluno@senai.br" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
            </div>

            <button type="submit">CADASTRAR</button>
        </form>

        {% if erro %}
            <P style="color: #E30613;">{{ erro }}</P>
        {% endif %}
        <br>
        <a href="/login" class="footer-link">Já tenho conta? Entrar</a>
    </div>

</body>
</html>

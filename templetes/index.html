<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo | SENAI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .hero-container {
            text-align: center;
            background-color: #ffffff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            border-bottom: 8px solid #005594;
        }

        .logo-placeholder {
            font-size: 48px;
            font-weight: 900;
            color: #005594;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #444;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* Botão de Login - Azul SENAI */
        .btn-login {
            background-color: #005594;
            color: white;
            border: 2px solid #005594;
        }

        .btn-login:hover {
            background-color: #003d6b;
            border-color: #003d6b;
        }

        /* Botão de Cadastro - Outline */
        .btn-cadastro {
            background-color: transparent;
            color: #005594;
            border: 2px solid #005594;
        }

        .btn-cadastro:hover {
            background-color: #f0f7ff;
            color: #003d6b;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="logo-placeholder">SENAI</div>
        <h1>Portal do Aluno</h1>
        <p>Bem-vindo ao sistema de gestão educacional. Escolha uma das opções abaixo para acessar sua conta ou criar um novo perfil.</p>

        <div class="button-group">
            <a href="/login" class="btn btn-login">Já sou cadastrado (Login)</a>
            <a href="/cadastro" class="btn btn-cadastro">Quero me cadastrar</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Serviço Nacional de Aprendizagem Industrial
    </footer>

</body>
</html>
